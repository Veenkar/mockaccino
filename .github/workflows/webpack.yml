name: NodeJS with Webpack

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      run: |
        npm install
        npm run compile

    - name: Run unit tests
      run: npm run test:unit

    - name: Run VS Code tests (headless)
      run: xvfb-run -a npm run test

  package:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Package extension (.vsix)
      run: npx --yes @vscode/vsce package
      # vsce runs the `vscode:prepublish` script (npm run package, the
      # production esbuild), so this also validates the minified build.

    - name: Upload .vsix artifact
      uses: actions/upload-artifact@v4
      with:
        name: mockaccino-vsix
        path: "*.vsix"
        if-no-files-found: error
