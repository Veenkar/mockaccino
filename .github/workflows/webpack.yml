name: NodeJS with Webpack

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install lcov (for genhtml coverage report)
      run: sudo apt-get update && sudo apt-get install -y lcov

    - name: Build
      run: |
        npm install
        npm run compile

    - name: Run unit tests
      run: npm run test:unit

    - name: Run VS Code tests (headless)
      run: xvfb-run -a npm run test

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: test-results/
        if-no-files-found: warn

    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        # Contains coverage/unit and coverage/vscode (separate per-suite dirs).
        name: coverage-node-${{ matrix.node-version }}
        path: coverage/
        if-no-files-found: warn

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install C/C++ toolchain
      # clang and cmake are preinstalled on ubuntu-latest; ninja is not.
      run: sudo apt-get update && sudo apt-get install -y ninja-build clang cmake

    - name: Cache GoogleTest (FetchContent download)
      # FetchContent unpacks the pinned GoogleTest into build/_deps; caching it
      # avoids re-downloading the archive on every run. Keyed on the CMakeLists
      # (which pins the gtest version), so a version bump busts the cache.
      uses: actions/cache@v4
      with:
        path: integration/build/_deps
        key: gtest-${{ runner.os }}-${{ hashFiles('integration/CMakeLists.txt') }}

    - name: Install dependencies
      run: npm install

    - name: Run integration suite (compiles + runs generated mocks)
      run: npm run test:integration

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-integration
        path: test-results/
        if-no-files-found: warn

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        # Extension-code-only coverage (no C++): the C/C++ toolchain runs as
        # non-Node subprocesses that c8 does not instrument.
        name: coverage-integration
        path: coverage/integration/
        if-no-files-found: warn

  package:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Package extension (.vsix)
      run: npx --yes @vscode/vsce package
      # vsce runs the `vscode:prepublish` script (npm run package, the
      # production esbuild), so this also validates the minified build.

    - name: Upload .vsix artifact
      uses: actions/upload-artifact@v4
      with:
        name: mockaccino-vsix
        path: "*.vsix"
        if-no-files-found: error
